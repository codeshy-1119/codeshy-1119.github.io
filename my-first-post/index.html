<!DOCTYPE html>
<html lang="chinese (simplified)">
<head>
    <title>才华恒毅的blog</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="http://127.0.0.1:8000/theme/css/style.min.css" />
    <link rel="stylesheet" href="http://127.0.0.1:8000/theme/css/dark-theme.min.css" />
    <link rel="stylesheet" href="http://127.0.0.1:8000/custom.css" />
</head>

<body>

    <!-- ===== 顶部导航栏 ===== -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="http://127.0.0.1:8000/" class="nav-brand">才华恒毅的blog</a>
            </div>
            <div class="nav-right">
                <a href="http://127.0.0.1:8000/" class="nav-link">首页</a>
                <a href="http://127.0.0.1:8000/archives.html" class="nav-link">归档</a>
                <a href="http://127.0.0.1:8000/categories.html" class="nav-link">分类</a>
                <a href="http://127.0.0.1:8000/tags.html" class="nav-link">标签</a>
                <a href="http://127.0.0.1:8000/author/cai-hua-heng-yi.html" class="nav-link">关于</a>
            </div>
        </div>
    </nav>

    <!-- ===== 页面内容（子模板填充） ===== -->

<!-- ===== 全屏视频背景（固定） ===== -->
<div id="hero">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="http://127.0.0.1:8000/images/blog.mp4" type="video/mp4">
        您的浏览器不支持视频背景。
    </video>
</div>

<!-- ===== 文章内容（浮在背景上的卡片） ===== -->
<div id="article-content">
    <article>
        <header>
            <h1 class="article-title">My First Post</h1>
            <p class="article-meta">
                周二 23 六月 2026
                    · <a href="http://127.0.0.1:8000/category/essay.html">Essay</a>
                    · Tagged with
                        <a href="http://127.0.0.1:8000/tag/python.html">python</a>,                        <a href="http://127.0.0.1:8000/tag/pelican.html">pelican</a>            </p>
        </header>
        <div class="article-body">
            <p>Welcome to my blog!
This is my first post generated by Pelican.</p>
        </div>
    </article>
</div>

<!-- ===== 右下角返回按钮（沿用首页风格） ===== -->
<button id="back-home" onclick="window.location.href='http://127.0.0.1:8000/'">🏠 返回</button>

<!-- ===== 样式覆盖 ===== -->
<style>
    /* ===== 全局重置 ===== */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-y: auto;
        background: transparent;
    }

    /* ===== 视频背景固定 ===== */
    #hero {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        overflow: hidden;
    }
    #bg-video {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        object-fit: cover;
    }

    /* ===== 文章内容（毛玻璃卡片，居中） ===== */
    #article-content {
        position: relative;
        z-index: 1;
        margin-top: 10vh;
        margin-bottom: 10vh;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        padding: 20px;
    }
    #article-content article {
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px 45px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        color: #222;
        line-height: 1.8;
        font-size: 1.05rem;
    }

    /* ===== 文章标题 ===== */
    .article-title {
        font-size: 2.2rem;
        margin-bottom: 10px;
        color: #1a3a2a;
        text-align: left;
        border-bottom: 3px solid #2a8a5a;
        padding-bottom: 15px;
    }
    .article-meta {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 25px;
        text-align: left;
    }
    .article-meta a {
        color: #2a7a5a;
        text-decoration: none;
    }
    .article-meta a:hover {
        text-decoration: underline;
    }

    /* ===== 文章正文 ===== */
    .article-body {
        text-align: left;
    }
    .article-body p {
        margin-bottom: 1.2em;
    }
    .article-body h2, .article-body h3 {
        margin-top: 1.8em;
        margin-bottom: 0.6em;
        color: #1a3a2a;
    }
    .article-body img {
        max-width: 100%;
        border-radius: 10px;
        margin: 20px 0;
        display: block;
    }
    .article-body pre, .article-body code {
        background: #f0f0f0;
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 0.95rem;
    }
    .article-body pre {
        padding: 16px;
        overflow-x: auto;
    }

    /* ===== 返回按钮 ===== */
    #back-home {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 10;
        padding: 14px 22px;
        background: rgba(42, 157, 143, 0.9);
        color: #fff;
        border: none;
        border-radius: 40px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        backdrop-filter: blur(4px);
        transition: background 0.2s, transform 0.2s;
    }
    #back-home:hover {
        background: rgba(42, 157, 143, 1);
        transform: scale(1.05);
    }
    #back-home:active {
        transform: scale(0.95);
    }

    /* ===== 隐藏原主题侧边栏、footer ===== */
    .row .col-sm-3,
    .row .col-md-3,
    .row .col-lg-3 {
        display: none !important;
    }
    .row .col-sm-9,
    .row .col-md-9,
    .row .col-lg-9 {
        width: 100% !important;
        max-width: 100% !important;
        flex: 0 0 100% !important;
    }
    footer {
        display: none !important;
    }
</style>


    <!-- ===== 底部版权信息（可选） ===== -->
    <footer style="text-align:center;padding:20px;background:transparent;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.5);position:relative;z-index:1;">
        <p>&copy; 才华恒毅的blog 2026</p>
    </footer>

    <!-- ===== 导航栏样式 ===== -->
    <style>
        /* ===== 导航栏（毛玻璃，固定在顶部） ===== */
        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
            box-sizing: border-box;
            transition: background 0.3s;
        }
        #navbar:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 16px;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }
        .nav-brand {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }
        .nav-brand:hover {
            color: #d4edda;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px 14px;
            flex-wrap: wrap;
        }
        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 30px;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            text-shadow: 0 1px 6px rgba(0,0,0,0.4);
        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: scale(1.04);
        }
        /* 当前页面高亮（可选，需要配合模板变量） */
        .nav-link.active {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 640px) {
            #navbar {
                padding: 10px 14px;
            }
            .nav-brand {
                font-size: 1.05rem;
            }
            .nav-link {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            .nav-right {
                gap: 4px 8px;
            }
        }

        /* ===== 给页面内容留出顶部空间（避免被导航栏遮挡） ===== */
        body {
            padding-top: 70px;
        }
    </style>

</body>
</html>
