<!-- ===== 搜索脚本和抽屉控制 ===== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    var searchInput = document.getElementById('search-input');
    var resultsBox = document.getElementById('search-results');
    var articles = [];

    fetch('http://127.0.0.1:8000/search.json')
        .then(response => response.json())
        .then(data => {
            articles = data;
            console.log('搜索索引数据:', data);  // 调试：查看索引内容
        })
        .catch(err => console.log('搜索索引加载失败:', err));

    searchInput.addEventListener('input', function() {
        var query = this.value.trim().toLowerCase();
        console.log('当前搜索词:', query);  // 调试
        if (query.length < 2) {
            resultsBox.style.display = 'none';
            return;
        }
        // 确保 articles 有数据
        if (!articles || articles.length === 0) {
            console.log('articles 尚未加载');
            return;
        }
        var matches = articles.filter(function(item) {
            return (item.title || '').toLowerCase().includes(query);
        }).slice(0, 10);
        console.log('匹配结果数:', matches.length);  // 调试

        if (matches.length > 0) {
            resultsBox.innerHTML = matches.map(function(item) {
                return '<a href="' + item.url + '" class="result-item">' +
                    '<strong>' + item.title + '</strong><br>' +
                    '<small>' + (item.summary || '').substring(0, 80) + '...</small></a>';
            }).join('');
            resultsBox.style.display = 'block';
        } else {
            resultsBox.innerHTML = '<div class="result-item" style="color:#999;">未找到相关文章</div>';
            resultsBox.style.display = 'block';
        }
    });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-container')) resultsBox.style.display = 'none';
    });

    // ===== 抽屉控制 =====
    var drawer = document.getElementById('content-drawer');
    var btn = document.getElementById('toggle-drawer');
    var header = document.getElementById('header-fixed');
    var isOpen = false;

    btn.addEventListener('click', function() {
        isOpen = !isOpen;
        drawer.classList.toggle('open', isOpen);
        header.classList.toggle('shift-up', isOpen);
        btn.textContent = isOpen ? '✕ 收起' : '📖 文章';
    });
});
</script>
