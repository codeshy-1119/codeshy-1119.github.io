<!-- ===== 搜索脚本 ===== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    var searchInput = document.getElementById('search-input');
    var resultsBox = document.getElementById('search-results');
    var articles = [];
    
    fetch('https://codeshy-1119.github.io/search.json')
        .then(response => response.json())
        .then(data => { articles = data; })
        .catch(err => console.log('搜索索引加载失败:', err));
    
    searchInput.addEventListener('input', function() {
        var query = this.value.trim().toLowerCase();
        if (query.length < 2) {
            resultsBox.style.display = 'none';
            return;
        }
        var matches = articles.filter(function(item) {
            return (item.title || '').toLowerCase().includes(query) ||
                   (item.summary || '').toLowerCase().includes(query);
        }).slice(0, 10);
        if (matches.length > 0) {
            resultsBox.innerHTML = matches.map(function(item) {
                return '<a href="' + item.url + '" class="result-item">' +
                    '<strong>' + item.title + '</strong><br>' +
                    '<small>' + (item.summary || '').substring(0, 80) + '...</small></a>';
            }).join('');
            resultsBox.style.display = 'block';
        } else {
            resultsBox.innerHTML = '<div class="result-item" style="color:#999;">未找到相关文章</div>';
            resultsBox.style.display = 'block';
        }
    });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-container')) resultsBox.style.display = 'none';
    });

    // ===== 抽屉控制 =====
    var drawer = document.getElementById('content-drawer');
    var btn = document.getElementById('toggle-drawer');
    var header = document.getElementById('header-fixed');  // 新增
    var isOpen = false;

    btn.addEventListener('click', function() {
        isOpen = !isOpen;
        drawer.classList.toggle('open', isOpen);
        header.classList.toggle('shift-up', isOpen);      // 新增：标题上移
        btn.textContent = isOpen ? '✕ 收起' : '📖 文章';
    });
});
</script>
