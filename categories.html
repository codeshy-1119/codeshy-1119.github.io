<!DOCTYPE html>
<html lang="chinese (simplified)">
<head>
    <title> &ndash; Categories</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://codeshy-1119.github.io/theme/css/style.min.css" />
    <link rel="stylesheet" href="https://codeshy-1119.github.io/theme/css/dark-theme.min.css" />
    <link rel="stylesheet" href="https://codeshy-1119.github.io/custom.css" />
</head>

<body>

    <!-- ===== 全局随机视频背景 ===== -->
    <div id="global-hero">
        <video autoplay muted loop playsinline id="bg-video"></video>
    </div>

    <!-- ===== 顶部导航栏（固定） ===== -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="https://codeshy-1119.github.io/" class="nav-brand">才华恒毅的blog</a>
            </div>
            <div class="nav-right">
                <a href="https://codeshy-1119.github.io/" class="nav-link">首页</a>
                <a href="https://codeshy-1119.github.io/archives.html" class="nav-link">归档</a>
                <a href="https://codeshy-1119.github.io/categories.html" class="nav-link">分类</a>
                <a href="https://codeshy-1119.github.io/tags.html" class="nav-link">标签</a>
                <a href="https://codeshy-1119.github.io/author/cai-hua-heng-yi.html" class="nav-link">关于</a>
            </div>
        </div>
    </nav>

    <!-- ===== 页面内容（子模板填充） ===== -->
<article class="single">
  <header>
    <h1 id="categories">Categories</h1>
  </header>
  <div>
    <ul class="list">
      <li>
        <a href="https://codeshy-1119.github.io/category/essay.html">Essay</a> (1)
      </li>
      <li>
        <a href="https://codeshy-1119.github.io/category/ji-zhu.html">技术</a> (2)
      </li>
    </ul>
  </div>
</article>

    <!-- ===== 底部版权信息 ===== -->
    <footer style="text-align:center;padding:20px;background:transparent;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.5);position:relative;z-index:1;">
        <p>&copy; 才华恒毅的blog 2026</p>
    </footer>

    <style>
        /* ===== 全局视频背景层 ===== */
        #global-hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        #global-hero video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }

        /* ===== 导航栏（固定在顶部） ===== */
        #navbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            z-index: 1000 !important;
            padding: 12px 20px !important;
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15) !important;
            box-sizing: border-box !important;
            transition: background 0.3s !important;
        }
        #navbar:hover {
            background: rgba(255, 255, 255, 0.25) !important;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 16px;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }
        .nav-brand {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }
        .nav-brand:hover {
            color: #d4edda;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px 14px;
            flex-wrap: wrap;
        }
        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 30px;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            text-shadow: 0 1px 6px rgba(0,0,0,0.4);
        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: scale(1.04);
        }
        .nav-link.active {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        @media (max-width: 640px) {
            #navbar {
                padding: 10px 14px !important;
            }
            .nav-brand {
                font-size: 1.05rem;
            }
            .nav-link {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            .nav-right {
                gap: 4px 8px;
            }
        }

        /* ===== 给页面内容留出顶部空间 ===== */
        body {
            padding-top: 70px !important;
            margin: 0 !important;
            background: transparent !important;
        }

        /* ===== 确保所有内容层级在视频之上 ===== */
        #navbar,
        #header-fixed,
        #content-drawer,
        #archives-header,
        #timeline,
        #article-content,
        #author-section,
        #article-list,
        #back-home,
        #toggle-drawer,
        footer {
            position: relative;
            z-index: 1;
        }

        /* ===== 修复右下角所有按钮的固定位置 ===== */
        #back-home,
        #toggle-drawer {
            position: fixed !important;
            bottom: 25px !important;
            right: 25px !important;
            z-index: 100 !important;
        }

        /* ===== 页面滚动时保持背景稳定 ===== */
        html, body {
            overflow-y: auto;
        }
    </style>

    <!-- ===== 随机视频切换脚本 ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var video = document.getElementById('bg-video');
            if (!video) return;

            var videoList = [
                '/images/blog.mp4',
                '/images/forest.mp4',
                '/images/ocean.mp4'
            ];

            var availableVideos = [];
            var checkCount = 0;
            if (videoList.length === 0) {
                videoList.push('/images/blog.mp4');
            }
            videoList.forEach(function(src) {
                var testVideo = document.createElement('video');
                testVideo.src = src;
                testVideo.onloadeddata = function() {
                    availableVideos.push(src);
                    checkCount++;
                    if (checkCount === videoList.length) {
                        applyRandomVideo();
                    }
                };
                testVideo.onerror = function() {
                    checkCount++;
                    if (checkCount === videoList.length) {
                        applyRandomVideo();
                    }
                };
            });

            function applyRandomVideo() {
                if (availableVideos.length === 0) {
                    availableVideos = videoList.slice(0, 1);
                }
                var randomIndex = Math.floor(Math.random() * availableVideos.length);
                var selected = availableVideos[randomIndex];
                video.src = selected;
                video.load();
                video.play().catch(function(e) {
                    console.log('视频自动播放被拦截');
                });
            }
        });
    </script>

</body>
</html>
