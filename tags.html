<!DOCTYPE html>
<html lang="chinese (simplified)">
<head>
    <title> &ndash; Tags</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://codeshy-1119.github.io/theme/css/style.min.css" />
    <link rel="stylesheet" href="https://codeshy-1119.github.io/theme/css/dark-theme.min.css" />
    <link rel="stylesheet" href="https://codeshy-1119.github.io/custom.css" />
</head>

<body>

    <!-- ===== 顶部导航栏 ===== -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="https://codeshy-1119.github.io/" class="nav-brand">才华恒毅的blog</a>
            </div>
            <div class="nav-right">
                <a href="https://codeshy-1119.github.io/" class="nav-link">首页</a>
                <a href="https://codeshy-1119.github.io/archives.html" class="nav-link">归档</a>
                <a href="https://codeshy-1119.github.io/categories.html" class="nav-link">分类</a>
                <a href="https://codeshy-1119.github.io/tags.html" class="nav-link">标签</a>
                <a href="https://codeshy-1119.github.io/author/cai-hua-heng-yi.html" class="nav-link">关于</a>
            </div>
        </div>
    </nav>

    <!-- ===== 页面内容（子模板填充） ===== -->
<article class="single">
  <header>
    <h1 id="tags">Tags</h1>
  </header>
  <div>
    <ul class="list">          <li><a href="https://codeshy-1119.github.io/tag/fang-zhen.html">仿真</a> (1)</li>
          <li><a href="https://codeshy-1119.github.io/tag/pelican.html">pelican</a> (1)</li>
          <li><a href="https://codeshy-1119.github.io/tag/python.html">python</a> (1)</li>
          <li><a href="https://codeshy-1119.github.io/tag/wang-luo.html">网络</a> (1)</li>
    </ul>
  </div>
</article>

    <!-- ===== 底部版权信息（可选） ===== -->
    <footer style="text-align:center;padding:20px;background:transparent;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.5);position:relative;z-index:1;">
        <p>&copy; 才华恒毅的blog 2026</p>
    </footer>

    <!-- ===== 导航栏样式 ===== -->
    <style>
        /* ===== 导航栏（毛玻璃，固定在顶部） ===== */
        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
            box-sizing: border-box;
            transition: background 0.3s;
        }
        #navbar:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 16px;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }
        .nav-brand {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }
        .nav-brand:hover {
            color: #d4edda;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px 14px;
            flex-wrap: wrap;
        }
        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 30px;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            text-shadow: 0 1px 6px rgba(0,0,0,0.4);
        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: scale(1.04);
        }
        /* 当前页面高亮（可选，需要配合模板变量） */
        .nav-link.active {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 640px) {
            #navbar {
                padding: 10px 14px;
            }
            .nav-brand {
                font-size: 1.05rem;
            }
            .nav-link {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            .nav-right {
                gap: 4px 8px;
            }
        }

        /* ===== 给页面内容留出顶部空间（避免被导航栏遮挡） ===== */
        body {
            padding-top: 70px;
        }
    </style>

</body>
</html>
