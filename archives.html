<!-- ===== 样式覆盖 ===== -->
<style>
    /* ===== 全局重置 ===== */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-y: auto;
        background: transparent;
    }

    /* ===== 视频背景 ===== */
    #hero {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        overflow: hidden;
    }
    #bg-video {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        object-fit: cover;
    }

    /* ===== 归档标题 ===== */
    #archives-header {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px 20px 10px;
        color: #fff;
        text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .archives-title {
        font-size: 2.8rem;
        margin-bottom: 4px;
        letter-spacing: 2px;
    }
    .archives-subtitle {
        font-size: 1.1rem;
        opacity: 0.8;
        margin: 0;
    }

    /* ===== 时间轴容器 ===== */
    #timeline {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 20px auto 60px;
        padding: 0 20px;
    }

    /* ===== 时间轴线 ===== */
    .timeline-line {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 4px;
        background: rgba(255, 255, 255, 0.4);
        transform: translateX(-50%);
        border-radius: 2px;
    }

    /* ===== 每个时间项 ===== */
    .timeline-item {
        display: flex;
        align-items: stretch;
        margin-bottom: 40px;
        position: relative;
    }
    .timeline-item.item-left {
        flex-direction: row;
    }
    .timeline-item.item-right {
        flex-direction: row-reverse;
    }

    /* ===== 时间节点（圆点 + 年份） ===== */
    .timeline-dot {
        flex: 0 0 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 10px;
        position: relative;
        z-index: 2;
    }
    .timeline-dot::before {
        content: '';
        width: 16px;
        height: 16px;
        background: #2a8a5a;
        border: 3px solid rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        display: block;
        box-shadow: 0 0 20px rgba(42, 138, 90, 0.4);
    }
    .dot-year {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.7);
        margin-top: 6px;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: rgba(0,0,0,0.3);
        padding: 2px 10px;
        border-radius: 12px;
    }

    /* ===== 文章卡片容器 ===== */
    .timeline-card {
        flex: 1;
        max-width: 45%;
        padding: 0 20px;
    }
    .timeline-item.item-left .timeline-card {
        text-align: right;
    }
    .timeline-item.item-right .timeline-card {
        text-align: left;
    }

    /* ===== 卡片样式（与首页一致） ===== */
    .article-card {
        display: flex;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        transition: transform 0.25s, box-shadow 0.25s;
        height: 180px;
    }
    .article-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .card-text {
        flex: 1.2;
        padding: 16px 22px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
    }
    .card-text h2 {
        margin: 0 0 4px 0;
    }
    .card-text h2 a {
        color: #1a3a2a;
        text-decoration: none;
        font-size: 1.1rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .card-text h2 a:hover {
        color: #2a7a5a;
        text-decoration: underline;
    }
    .post-meta {
        font-size: 0.75rem;
        color: #777;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .post-meta a {
        color: #2a7a5a;
        text-decoration: none;
    }
    .post-meta a:hover {
        text-decoration: underline;
    }
    .read-more {
        display: inline-block;
        margin-top: 4px;
        color: #2a7a5a;
        font-weight: 600;
        text-decoration: none;
        align-self: flex-start;
        font-size: 0.9rem;
    }
    .read-more:hover {
        text-decoration: underline;
    }

    .card-image {
        flex: 1;
        min-width: 0;
        height: 180px;
        background: #e8ece8;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .placeholder-img {
        font-size: 3rem;
        opacity: 0.25;
    }

    /* ===== 左右交替（卡片内部） ===== */
    .article-card.card-left .card-image {
        order: 2;
    }
    .article-card.card-left .card-text {
        order: 1;
    }
    .article-card.card-right .card-image {
        order: 1;
    }
    .article-card.card-right .card-text {
        order: 2;
    }

    /* ===== 返回按钮 ===== */
    #back-home {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 10;
        padding: 14px 22px;
        background: rgba(42, 157, 143, 0.9);
        color: #fff;
        border: none;
        border-radius: 40px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        backdrop-filter: blur(4px);
        transition: background 0.2s, transform 0.2s;
    }
    #back-home:hover {
        background: rgba(42, 157, 143, 1);
        transform: scale(1.05);
    }
    #back-home:active {
        transform: scale(0.95);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 820px) {
        .timeline-item {
            flex-direction: column !important;
            align-items: center;
            margin-bottom: 30px;
        }
        .timeline-line {
            left: 20px;
        }
        .timeline-dot {
            flex: 0 0 auto;
            flex-direction: row;
            gap: 12px;
            padding: 0 0 10px 0;
            width: 100%;
            justify-content: flex-start;
            padding-left: 10px;
        }
        .timeline-dot::before {
            width: 14px;
            height: 14px;
        }
        .dot-year {
            font-size: 0.8rem;
            margin-top: 0;
        }
        .timeline-card {
            max-width: 90%;
            padding: 0;
            width: 100%;
        }
        .timeline-item.item-left .timeline-card,
        .timeline-item.item-right .timeline-card {
            text-align: left;
        }
        .article-card {
            height: auto;
            min-height: 160px;
            flex-direction: column;
        }
        .article-card.card-left .card-image,
        .article-card.card-right .card-image {
            order: 0;
            height: 140px;
        }
        .article-card.card-left .card-text,
        .article-card.card-right .card-text {
            order: 1;
        }
        .card-text {
            padding: 14px 18px;
        }
        .card-text h2 a {
            font-size: 1rem;
        }
        .archives-title {
            font-size: 2rem;
        }
    }

    @media (max-width: 480px) {
        .timeline-card {
            max-width: 95%;
        }
        .card-image {
            height: 120px;
        }
        .card-text {
            padding: 12px 14px;
        }
        .card-text h2 a {
            font-size: 0.95rem;
        }
        .post-meta {
            font-size: 0.7rem;
        }
        #back-home {
            bottom: 15px;
            right: 15px;
            padding: 10px 16px;
            font-size: 0.9rem;
        }
    }

    /* ===== 隐藏原主题侧边栏、footer ===== */
    .row .col-sm-3,
    .row .col-md-3,
    .row .col-lg-3 {
        display: none !important;
    }
    .row .col-sm-9,
    .row .col-md-9,
    .row .col-lg-9 {
        width: 100% !important;
        max-width: 100% !important;
        flex: 0 0 100% !important;
    }
    footer {
        display: none !important;
    }
</style>

    <!-- ===== 导航栏样式 ===== -->
    <style>

        .nav-brand {
            font-size: 1.3rem;

            letter-spacing: 0.5px;
        }
        .nav-brand:hover {
            color: #d4edda;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px 14px;
            flex-wrap: wrap;
        }
        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 30px;
            transition: background 0.2s, color 0.2s, transform 0.15s;

        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;

        }
        /* 当前页面高亮（可选，需要配合模板变量） */
        .nav-link.active {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 640px) {
            #navbar {
                padding: 10px 14px;
            }
            .nav-brand {
                font-size: 1.05rem;
            }
            .nav-link {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            .nav-right {
                gap: 4px 8px;
            }
        }

        /* ===== 给页面内容留出顶部空间（避免被导航栏遮挡） ===== */
        body {
            padding-top: 70px;
        }
    </style>

</body>
