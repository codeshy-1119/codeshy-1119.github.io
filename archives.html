    <!-- ===== 随机视频切换脚本 ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var video = document.getElementById('bg-video');
            if (!video) return;

            // ===== 在这里配置你的视频列表（可自行增删） =====
            var videoList = [
                '/images/blog.mp4',
                '/images/forest.mp4',
                '/images/ocean.mp4'
                // 添加更多视频，格式：'/images/xxx.mp4'
            ];

            // 过滤掉不存在的视频（可选，避免404）
            var availableVideos = [];
            var checkCount = 0;
            if (videoList.length === 0) {
                videoList.push('/images/blog.mp4');
            }
            videoList.forEach(function(src) {
                var testVideo = document.createElement('video');
                testVideo.src = src;
                testVideo.onloadeddata = function() {
                    availableVideos.push(src);
                    checkCount++;
                    if (checkCount === videoList.length) {
                        applyRandomVideo();
                    }
                };
                testVideo.onerror = function() {
                    checkCount++;
                    if (checkCount === videoList.length) {
                        applyRandomVideo();
                    }
                };
            });

            function applyRandomVideo() {
                if (availableVideos.length === 0) {
                    availableVideos = videoList.slice(0, 1);
                }
                var randomIndex = Math.floor(Math.random() * availableVideos.length);
                var selected = availableVideos[randomIndex];
                video.src = selected;
                video.load();
                video.play().catch(function(e) {
                    console.log('视频自动播放被拦截');
                });
            }
        });
    </script>
