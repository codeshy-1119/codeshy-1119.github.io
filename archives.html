<style>
    /* ===== 全局重置 ===== */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-y: auto;
        background: transparent;
    }

    /* ===== 视频背景 ===== */
    #hero {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        overflow: hidden;
    }
    #bg-video {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        object-fit: cover;
    }

    /* ===== 标题 ===== */
    #archives-header {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px 20px 10px;
        color: #fff;
        text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .archives-title {
        font-size: 2.8rem;
        margin-bottom: 4px;
        letter-spacing: 2px;
    }
    .archives-subtitle {
        font-size: 1.1rem;
        opacity: 0.8;
        margin: 0;
    }

    /* ===== 时间轴容器 ===== */
    #timeline {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 20px auto 60px;
        padding: 0 20px;
    }

    /* ===== 每一行：grid 三列布局 ===== */
    .timeline-row {
        display: grid;
        grid-template-columns: 1fr 80px 1fr;
        align-items: center;
        margin-bottom: 40px;
        position: relative;
    }

    /* ===== 时间节点（居中） ===== */
    .timeline-node {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
    }
    /* 时间线（竖线）通过伪元素实现，从第一个节点到最后一个 */
    .timeline-node::before {
        content: '';
        position: absolute;
        top: -40px;
        bottom: -40px;
        left: 50%;
        width: 4px;
        background: rgba(255, 255, 255, 0.3);
        transform: translateX(-50%);
        z-index: -1;
    }
    /* 第一个节点上方不显示线条，最后一个节点下方不显示？我们可以用容器伪类控制，但为了简单，我们直接对整个 timeline 容器添加伪类 */
    /* 这里我们可以改用背景线性渐变或单独画线。为了简便，我们用一个独立元素画线，之前的方法更易控制。 */
    /* 我们改用之前的方法：绝对定位一个 line */
    /* 下面我们将 .timeline-line 作为单独元素，或者使用一个全高度的线 */

    /* 重新定义：我们使用伪元素画线，但需要控制起点和终点，这里用绝对定位 line 更简单 */
    /* 我们添加一个 .timeline-line 作为子元素，绝对定位在中间 */

    /* ===== 时间节点样式 ===== */
    .timeline-dot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(42, 138, 90, 0.35);   /* 半透明白绿色 */
        backdrop-filter: blur(6px);             /* 毛玻璃效果 */
        border: 2px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 0 30px rgba(42, 138, 90, 0.15);
        position: relative;
        z-index: 2;
        transition: all 0.3s ease;
    }
    .timeline-dot:hover {
        background: rgba(42, 138, 90, 0.6);
        transform: scale(1.1);
    }
    .dot-year {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.7);
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(2px);
        padding: 2px 10px;
        border-radius: 12px;
        margin-top: 6px;
        font-weight: 400;
    }

    /* ===== 卡片容器 ===== */
    .timeline-card-wrapper {
        display: flex;
        justify-content: flex-start;
    }
    .left-card {
        justify-content: flex-end;
        padding-right: 20px;
    }
    .right-card {
        justify-content: flex-start;
        padding-left: 20px;
    }
    .empty-card {
        visibility: hidden; /* 隐藏空卡片占位 */
    }

    /* ===== 卡片样式（与首页一致） ===== */
    .article-card {
        display: flex;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        transition: transform 0.25s, box-shadow 0.25s;
        height: 180px;
        max-width: 100%;
        width: 100%;
    }
    .article-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .card-text {
        flex: 1.2;
        padding: 16px 22px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
    }
    .card-text h2 {
        margin: 0 0 4px 0;
    }
    .card-text h2 a {
        color: #1a3a2a;
        text-decoration: none;
        font-size: 1.1rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .card-text h2 a:hover {
        color: #2a7a5a;
        text-decoration: underline;
    }
    .post-meta {
        font-size: 0.75rem;
        color: #777;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .post-meta a {
        color: #2a7a5a;
        text-decoration: none;
    }
    .post-meta a:hover {
        text-decoration: underline;
    }
    .read-more {
        display: inline-block;
        margin-top: 4px;
        color: #2a7a5a;
        font-weight: 600;
        text-decoration: none;
        align-self: flex-start;
        font-size: 0.9rem;
    }
    .read-more:hover {
        text-decoration: underline;
    }

    .card-image {
        flex: 1;
        min-width: 0;
        height: 180px;
        background: #e8ece8;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .placeholder-img {
        font-size: 3rem;
        opacity: 0.25;
    }

    /* ===== 时间线（贯穿所有行的竖线） ===== */
    /* 我们使用一个绝对定位的元素放在 #timeline 中 */
    #timeline {
        position: relative;
    }
    #timeline::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 4px;
        background: rgba(255, 255, 255, 0.4);
        transform: translateX(-50%);
        border-radius: 2px;
    }

    /* ===== 返回按钮 ===== */
    #back-home {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 10;
        padding: 14px 22px;
        background: rgba(42, 157, 143, 0.9);
        color: #fff;
        border: none;
        border-radius: 40px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        backdrop-filter: blur(4px);
        transition: background 0.2s, transform 0.2s;
    }
    #back-home:hover {
        background: rgba(42, 157, 143, 1);
        transform: scale(1.05);
    }
    #back-home:active {
        transform: scale(0.95);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 820px) {
        .timeline-row {
            grid-template-columns: 1fr 40px 1fr;
        }
        .timeline-dot {
            width: 40px;
            height: 40px;
        }
        .dot-year {
            font-size: 0.6rem;
            padding: 1px 6px;
        }
        .article-card {
            height: auto;
            flex-direction: column;
        }
        .card-image {
            height: 140px;
        }
        .card-text h2 a {
            font-size: 1rem;
        }
        .left-card {
            padding-right: 10px;
        }
        .right-card {
            padding-left: 10px;
        }
    }

    @media (max-width: 600px) {
        .timeline-row {
            grid-template-columns: 1fr 30px 1fr;
            gap: 0;
        }
        .timeline-dot {
            width: 30px;
            height: 30px;
        }
        .dot-year {
            font-size: 0.5rem;
            padding: 1px 4px;
        }
        .article-card {
            min-height: 140px;
        }
        .card-image {
            height: 100px;
        }
        .card-text {
            padding: 12px 14px;
        }
        .card-text h2 a {
            font-size: 0.9rem;
        }
        .post-meta {
            font-size: 0.65rem;
        }
        .read-more {
            font-size: 0.8rem;
        }
        .left-card {
            padding-right: 6px;
        }
        .right-card {
            padding-left: 6px;
        }
        #back-home {
            bottom: 15px;
            right: 15px;
            padding: 10px 16px;
            font-size: 0.9rem;
        }
    }

    /* ===== 隐藏原主题侧边栏、footer ===== */
    .row .col-sm-3,
    .row .col-md-3,
    .row .col-lg-3 {
        display: none !important;
    }
    .row .col-sm-9,
    .row .col-md-9,
    .row .col-lg-9 {
        width: 100% !important;
        max-width: 100% !important;
        flex: 0 0 100% !important;
    }
    footer {
        display: none !important;
    }
</style>

        /* ===== 移动端适配 ===== */

        /* ===== 给页面内容留出顶部空间（避免被导航栏遮挡） ===== */
